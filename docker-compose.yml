name: daddy-agent
services:
  neo4j:
    image: neo4j:5.26-community
    container_name: daddy-agent-neo4j
    # Bind to loopback only; dev-only Neo4j must not be reachable from the LAN
    # given the placeholder password in .env.example.
    ports:
      - "127.0.0.1:7474:7474"   # HTTP Browser
      - "127.0.0.1:7687:7687"   # Bolt protocol
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:?NEO4J_PASSWORD env var is required}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_server_memory_heap_initial__size=512M
      - NEO4J_server_memory_heap_max__size=1G
      - NEO4J_server_memory_pagecache_size=512M
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_plugins:/plugins
      - neo4j_import:/var/lib/neo4j/import
    healthcheck:
      # Probe Bolt + auth with cypher-shell so dependent services only start
      # once the DB is actually query-ready (not just HTTP listener alive).
      # Single-$ on ${NEO4J_PASSWORD} means compose substitutes it from the
      # host env at file-parse time and bakes the value into the
      # healthcheck argv — we cannot expose NEO4J_PASSWORD as a container
      # env var because the Neo4j entrypoint treats every NEO4J_* name as
      # a config key and strict validation rejects unknown ones.
      test:
        - "CMD-SHELL"
        - 'cypher-shell -u neo4j -p "${NEO4J_PASSWORD}" "RETURN 1" || exit 1'
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_plugins:
  neo4j_import:
