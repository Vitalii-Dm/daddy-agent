<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Daddy Agent — Knowledge Graph</title>
    <link rel="stylesheet" href="/static/style.css" />
    <!--
      CDN pinning policy (see docs/viz.md § Supply chain for bump procedure):
        - graphology         v0.25.4   (graph data structure)
        - graphology-library v0.8.0    (UMD bundle that includes the
                                        layout-forceatlas2 algorithm —
                                        the standalone forceatlas2 npm
                                        package ships only CommonJS
                                        source, no browser build)
        - sigma.js           v3.0.1    (WebGL renderer)

      Each <script> tag MUST carry an `integrity` SRI hash.  The hashes below
      are placeholders — a literal version pin without a hash does not protect
      against CDN compromise, so they MUST be regenerated by running:
          scripts/compute-sri-hashes.sh  (see the script for detail)
      before deploying to any shared environment.  The `REQUIRES_SRI_REGEN`
      marker below is checked by tests/viz/test_sri_hashes_present.py so the
      build fails loudly if a real deploy goes out with placeholders.
    -->
    <script
      src="https://cdn.jsdelivr.net/npm/graphology@0.25.4/dist/graphology.umd.min.js"
      integrity="sha384-643a1dipBp0OHFnm3WeZmMnuJ+ZY/MEll1vTGCjeFzkB/RySh+Almy3Ffn+sxO7y"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/graphology-library@0.8.0/dist/graphology-library.min.js"
      integrity="sha384-JfW8ehTxF6vKpm17Oz+cpaluYzFMvm6YfXgwbw5Hxzrn0rR6WR+0DDDWPEIv9CtK"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/sigma@3.0.1/dist/sigma.min.js"
      integrity="sha384-WfseDhOK74KFNUyIuhDyZ+KNI5KYrPcW8bjH6DfpgnJe8jzIpJQbRE9xMSl7/Eb7"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"></script>
  </head>
  <body>
    <header class="topbar">
      <h1>Daddy Agent Graph</h1>
      <nav class="tabs" role="tablist">
        <button class="tab" data-db="codebase" role="tab" aria-selected="true">Codebase</button>
        <button class="tab" data-db="memory" role="tab" aria-selected="false">Memory</button>
      </nav>
      <span id="status" class="status">connecting…</span>
    </header>
    <main>
      <aside class="filters">
        <label>
          <span>View</span>
          <select id="f-view">
            <option value="summary" selected>Summary (files + imports)</option>
            <option value="detail">Detail (everything)</option>
          </select>
        </label>
        <label class="summary-only">
          <span>Hide hubs with imports &gt;</span>
          <input id="f-hub-threshold" type="number" value="8" min="0" max="10000" step="1" />
        </label>
        <label class="detail-only">
          <span>Type</span>
          <input id="f-type" type="text" placeholder="File, Function, Entity…" />
        </label>
        <label class="detail-only">
          <span>Community</span>
          <input id="f-community" type="text" placeholder="id or label" />
        </label>
        <label class="detail-only">
          <span>Limit</span>
          <input id="f-limit" type="number" value="300" min="10" max="20000" step="50" />
        </label>
        <label>
          <span>Search</span>
          <input id="f-search" type="text" placeholder="name contains…" />
        </label>
        <button id="f-apply" type="button">Apply</button>
        <div id="search-results" class="search-results"></div>
        <div id="hidden-hubs" class="hidden-hubs"></div>
      </aside>
      <section id="graph" class="graph" aria-label="graph canvas"></section>
      <aside id="details" class="details">
        <h2>Select a node</h2>
        <p class="muted">Click any node in the graph to see its properties and neighbors.</p>
      </aside>
    </main>
    <script>
      (function () {
        "use strict";
        const state = {
          db: "codebase",
          graph: null,
          renderer: null,
          eventSource: null,
        };

        function setStatus(msg, kind) {
          const el = document.getElementById("status");
          el.textContent = msg;
          el.className = "status " + (kind || "");
        }

        function currentDb() {
          const hash = window.location.hash.replace(/^#\//, "").trim();
          if (hash === "memory" || hash === "codebase") return hash;
          return "codebase";
        }

        function syncTabs() {
          state.db = currentDb();
          document.querySelectorAll(".tab").forEach(function (t) {
            const active = t.dataset.db === state.db;
            t.setAttribute("aria-selected", String(active));
            t.classList.toggle("active", active);
          });
        }

        async function fetchJSON(url) {
          const r = await fetch(url);
          if (!r.ok) throw new Error("HTTP " + r.status);
          return await r.json();
        }

        function buildGraph(payload) {
          const Graph = window.graphology;
          const g = new Graph({ multi: true, type: "directed" });
          // Place nodes on a circle so the very first ForceAtlas2 frame
          // has a sensible seed (random scatter takes many extra
          // iterations to untangle on dense graphs).
          const N = (payload.nodes || []).length;
          (payload.nodes || []).forEach(function (n, i) {
            if (!g.hasNode(n.id)) {
              const angle = N > 0 ? (2 * Math.PI * i) / N : 0;
              const r = 1 + Math.sqrt(Math.max(1, N)) * 0.05;
              g.addNode(n.id, {
                label: n.label,
                // server-driven size (degree-weighted); fallback for old payloads
                size: typeof n.size === "number" ? n.size : 4,
                color: colorFor(n),
                nodeType: n.type,
                community: n.community,
                degree: typeof n.degree === "number" ? n.degree : 0,
                attributes: n.attributes || {},
                x: Math.cos(angle) * r,
                y: Math.sin(angle) * r,
              });
            }
          });
          (payload.edges || []).forEach(function (e) {
            if (!g.hasNode(e.source) || !g.hasNode(e.target)) return;
            // Inherit the source node's colour (with reduced alpha) so
            // each directory's outgoing edges form a coloured halo
            // around its files — visually surfaces directory clusters
            // before the layout has finished settling.  A grey fallback
            // (edgeColorFor) covers structural edges between non-File
            // nodes (e.g. Class EXTENDS Class).
            const sourceColor = g.getNodeAttribute(e.source, "color");
            const baseColor = sourceColor && typeof sourceColor === "string"
              ? sourceColor
              : edgeColorFor(e.type);
            g.addEdgeWithKey(e.id, e.source, e.target, {
              label: e.type,
              // Pin to Sigma's built-in "line" program — Sigma 3 rejects
              // arbitrary type strings ("IMPORTS", etc) with
              //   "could not find a suitable program for edge type X"
              type: "line",
              size: 0.6,
              color: withAlpha(baseColor, 0.45),
            });
          });
          return g;
        }

        // Add an alpha channel to a CSS colour string.  Supports HSL
        // (used for File nodes' per-directory hue) and #RRGGBB hex
        // (used for the Tableau palette).  Anything else passes through.
        function withAlpha(color, alpha) {
          if (color.startsWith("hsl(")) {
            return color.replace(/^hsl\(/, "hsla(").replace(/\)$/, "," + alpha + ")");
          }
          if (color.startsWith("#") && color.length === 7) {
            const r = parseInt(color.slice(1, 3), 16);
            const g = parseInt(color.slice(3, 5), 16);
            const b = parseInt(color.slice(5, 7), 16);
            return "rgba(" + r + "," + g + "," + b + "," + alpha + ")";
          }
          return color;
        }

        // Distinct, color-blind-friendlier palette (Tableau 10).
        // Files get a per-directory hue so siblings cluster visually
        // even before ForceAtlas2 finishes.
        const TYPE_COLORS = {
          Function: "#4e79a7",
          Class: "#f28e2c",
          Method: "#76b7b2",
          Module: "#9c755f",
          Entity: "#e15759",
          Message: "#59a14f",
          Session: "#edc949",
          ReasoningTrace: "#b07aa1",
          ToolCall: "#ff9da7",
        };

        function colorFor(n) {
          if (n.type === "File") return fileColor(n);
          return TYPE_COLORS[n.type] || "#bab0ac";
        }

        // Hash a file's directory to a stable hue so all files in
        // src/daddy_agent/codebase_graph share a colour, etc.
        function fileColor(n) {
          const path = (n.attributes && n.attributes.path) || n.label || "";
          const dir = path.split("/").slice(0, -1).join("/") || "_root";
          let h = 0;
          for (let i = 0; i < dir.length; i++) h = (h * 31 + dir.charCodeAt(i)) | 0;
          const hue = Math.abs(h) % 360;
          return "hsl(" + hue + ", 65%, 58%)";
        }

        function edgeColorFor(t) {
          if (t === "IMPORTS") return "#5a8dd6";
          if (t === "EXTENDS" || t === "IMPLEMENTS") return "#e07b39";
          if (t === "CALLS") return "#666";
          return "#444";
        }

        // Cancellation token: when render() restarts, the previous
        // layout loop checks token.cancelled and bails on its next yield.
        function newLayoutToken() {
          if (state.layoutToken) state.layoutToken.cancelled = true;
          state.layoutToken = { cancelled: false };
          return state.layoutToken;
        }

        // Run ForceAtlas2 one (or two) iterations at a time, yielding
        // between each step so Sigma can repaint and the user *sees*
        // the layout converge live.  Bigger chunks are tempting for
        // total wall-clock but fight the goal: a 30-iter chunk on
        // 900 nodes blocks for 500ms+, no paint slot, looks frozen.
        async function runLayoutChunked(graph, token, onProgress) {
          if (!graph.order) {
            onProgress(0, 0);
            return;
          }
          const FA2 = window.graphologyLibrary && window.graphologyLibrary.layoutForceAtlas2
            ? window.graphologyLibrary.layoutForceAtlas2
            : window.forceAtlas2;
          if (!FA2 || typeof FA2.assign !== "function") return;

          const order = graph.order;
          const big = order > 300;
          const huge = order > 700;
          // Cap total iterations more aggressively as the graph grows —
          // diminishing returns kick in fast on dense graphs and the
          // user's perception of "responsive" matters more than the
          // last 5% of layout convergence.
          const totalIters = huge ? 80 : big ? 120 : 200;
          // 1 iter per chunk on big graphs gives a paint after every
          // step.  Small graphs can afford 3–5 per chunk and still
          // feel smooth.
          const chunkSize = huge ? 1 : big ? 2 : order > 100 ? 3 : 5;
          const settings = {
            gravity: 1.4,
            scalingRatio: 28,
            slowDown: 4,
            strongGravityMode: false,
            linLogMode: true,
            barnesHutOptimize: big,
            barnesHutTheta: 0.6,
            edgeWeightInfluence: 0.4,
            adjustSizes: true,
          };

          let lastProgressAt = 0;
          for (let i = 0; i < totalIters; i += chunkSize) {
            if (token.cancelled) return;
            const thisChunk = Math.min(chunkSize, totalIters - i);
            FA2.assign(graph, { iterations: thisChunk, settings });
            // Defensive: some Sigma builds need an explicit refresh()
            // when many node attributes change in one tick.  Cheap.
            if (state.renderer) state.renderer.refresh();
            const now = performance.now();
            // Throttle status updates to ~10/s so the DOM write isn't
            // its own perf hit on tiny chunks.
            if (now - lastProgressAt > 100 || i + thisChunk >= totalIters) {
              onProgress(i + thisChunk, totalIters);
              lastProgressAt = now;
            }
            // Yield to the browser so Sigma paints the new positions
            // and the UI stays interactive.
            await new Promise(function (resolve) {
              requestAnimationFrame(function () { resolve(); });
            });
          }
        }

        function syncViewControls() {
          const summary = document.getElementById("f-view").value === "summary";
          document.querySelectorAll(".detail-only").forEach(function (el) {
            el.classList.toggle("hidden", summary);
          });
          document.querySelectorAll(".summary-only").forEach(function (el) {
            el.classList.toggle("hidden", !summary);
          });
        }

        // Yield one animation frame so a setStatus() call paints
        // before the next blocking step starts.  Without this, the
        // status text we set right before a heavy synchronous stage
        // (Sigma instantiation, first FA2 chunk) never shows up.
        function nextPaint() {
          return new Promise(function (resolve) {
            requestAnimationFrame(function () { resolve(); });
          });
        }

        async function render() {
          syncTabs();
          syncViewControls();
          const t0 = performance.now();
          const elapsed = function () {
            return Math.round(performance.now() - t0);
          };
          const token = newLayoutToken();
          setStatus("fetching…");

          const view = document.getElementById("f-view").value;
          const params = new URLSearchParams({ db: state.db, view: view });
          if (view === "detail") {
            const limit = document.getElementById("f-limit").value || "300";
            params.set("limit", String(limit));
            const type = document.getElementById("f-type").value.trim();
            const community = document.getElementById("f-community").value.trim();
            if (type) params.set("type", type);
            if (community) params.set("community", community);
          } else {
            // Summary: pass the hub-threshold so the user can dial
            // "stdlib noise" in or out without round-tripping detail mode.
            const t = document.getElementById("f-hub-threshold").value;
            if (t !== "" && t !== null) params.set("hub_threshold", String(t));
          }
          let payload;
          const tFetch0 = performance.now();
          try {
            payload = await fetchJSON("/api/graph?" + params.toString());
          } catch (err) {
            setStatus("error: " + err.message, "error");
            return;
          }
          const tFetch = Math.round(performance.now() - tFetch0);
          if (token.cancelled) return;

          const nodeCount = (payload.nodes || []).length;
          const edgeCount = (payload.edges || []).length;
          setStatus(
            "[" + elapsed() + "ms] building · " + nodeCount + " nodes / " +
              edgeCount + " edges (fetch " + tFetch + "ms)",
          );
          // Yield so the "building" status actually paints before
          // the synchronous graphology build starts.
          await nextPaint();
          if (token.cancelled) return;

          const graph = buildGraph(payload);
          if (token.cancelled) return;

          setStatus(
            "[" + elapsed() + "ms] mounting renderer · " + nodeCount +
              " nodes / " + edgeCount + " edges",
          );
          await nextPaint();
          if (token.cancelled) return;

          // Sigma instantiation does WebGL setup + first paint.  Yield
          // afterwards so the initial circle layout actually shows on
          // screen before the layout starts moving things.
          if (state.renderer) state.renderer.kill();
          const container = document.getElementById("graph");
          container.innerHTML = "";
          state.graph = graph;
          state.renderer = new window.Sigma(graph, container, {
            renderEdgeLabels: false,
            labelDensity: 0.6,
            labelGridCellSize: 80,
            labelRenderedSizeThreshold: 7,
            defaultEdgeColor: "#666",
            zIndex: true,
          });
          state.renderer.on("clickNode", function (evt) {
            showNode(evt.node);
          });
          await nextPaint();
          if (token.cancelled) return;
          // Sigma reads container.clientWidth/Height in its constructor;
          // if any layout was still pending (custom-element upgrade,
          // late-arriving font, scrollbar settling) the canvas can be
          // sized off a stale measurement.  A refresh() after one
          // paint forces Sigma to re-measure against the now-stable
          // grid track, fixing the "tall and skinny" canvas symptom.
          state.renderer.refresh();

          const tFirstPaint = elapsed();
          setStatus(
            "[" + tFirstPaint + "ms] first paint · animating layout…",
            "warn",
          );

          const totalEdges = graph.size;
          await runLayoutChunked(graph, token, function (done, total) {
            if (token.cancelled) return;
            const pct = total > 0 ? Math.round((done / total) * 100) : 100;
            setStatus(
              "[" + elapsed() + "ms] layout " + pct + "% · " +
                graph.order + " nodes / " + totalEdges + " edges",
              "warn",
            );
          });
          if (token.cancelled) return;

          const hidden = (payload && payload.hidden_hubs) || 0;
          const hubList = (payload && payload.hidden_hub_list) || [];
          renderHiddenHubs(hubList);
          const hubMsg = hidden > 0 ? " · hid " + hidden + " hub modules" : "";
          setStatus(
            "ok · " + view + " · " + graph.order + " / " + totalEdges +
              hubMsg + " · " + elapsed() + "ms",
            "ok",
          );
        }

        function renderHiddenHubs(hubs) {
          const target = document.getElementById("hidden-hubs");
          if (!target) return;
          if (!hubs || !hubs.length) {
            target.innerHTML = "";
            return;
          }
          const rows = hubs.map(function (h) {
            return (
              '<li><span class="hub-name">' + escape(String(h.name)) +
              '</span><span class="hub-count">' + escape(String(h.fan_in)) + "</span></li>"
            );
          }).join("");
          target.innerHTML =
            '<h3>Hidden hubs <span class="muted">(' + hubs.length +
            ")</span></h3>" +
            '<p class="muted">Modules above the threshold; raise it to bring them back.</p>' +
            "<ul>" + rows + "</ul>";
        }

        async function showNode(id) {
          const details = document.getElementById("details");
          details.innerHTML = "<h2>Loading…</h2>";
          try {
            const data = await fetchJSON(
              "/api/node/" + encodeURIComponent(id) + "/neighbors?db=" + state.db + "&depth=1"
            );
            const me = (data.nodes || []).find(function (n) { return n.id === id; });
            const others = (data.nodes || []).filter(function (n) { return n.id !== id; });
            const attrs = me ? me.attributes || {} : {};
            const rows = Object.keys(attrs).map(function (k) {
              return "<tr><th>" + escape(k) + "</th><td>" + escape(String(attrs[k])) + "</td></tr>";
            }).join("");
            const neighbors = others.map(function (n) {
              return "<li><a href=\"#\" data-id=\"" + escape(n.id) + "\">" + escape(n.label) + "</a> <em>" + escape(n.type) + "</em></li>";
            }).join("");
            details.innerHTML =
              "<h2>" + (me ? escape(me.label) : "Node") + "</h2>" +
              "<p class=\"muted\">" + (me ? escape(me.type) : "") + "</p>" +
              "<table>" + rows + "</table>" +
              "<h3>Neighbors</h3><ul>" + neighbors + "</ul>";
            details.querySelectorAll("a[data-id]").forEach(function (a) {
              a.addEventListener("click", function (e) {
                e.preventDefault();
                showNode(a.dataset.id);
              });
            });
          } catch (err) {
            details.innerHTML = "<h2>Error</h2><p>" + escape(err.message) + "</p>";
          }
        }

        function escape(s) {
          return String(s).replace(/[&<>"']/g, function (c) {
            return ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"})[c];
          });
        }

        async function runSearch() {
          const q = document.getElementById("f-search").value.trim();
          const target = document.getElementById("search-results");
          if (!q) { target.innerHTML = ""; return; }
          try {
            const data = await fetchJSON(
              "/api/search?db=" + state.db + "&q=" + encodeURIComponent(q) + "&limit=20"
            );
            target.innerHTML = (data.results || []).map(function (n) {
              return "<a href=\"#\" data-id=\"" + escape(n.id) + "\">" + escape(n.label) + "</a>";
            }).join("");
            target.querySelectorAll("a[data-id]").forEach(function (a) {
              a.addEventListener("click", function (e) {
                e.preventDefault();
                showNode(a.dataset.id);
              });
            });
          } catch (err) {
            target.innerHTML = "<span class=\"muted\">" + escape(err.message) + "</span>";
          }
        }

        function subscribe() {
          if (state.eventSource) state.eventSource.close();
          const es = new EventSource("/events");
          es.addEventListener("graph-updated", function () { render(); });
          es.onerror = function () { setStatus("events: reconnecting…", "warn"); };
          state.eventSource = es;
        }

        document.querySelectorAll(".tab").forEach(function (t) {
          t.addEventListener("click", function () {
            window.location.hash = "#/" + t.dataset.db;
          });
        });
        window.addEventListener("hashchange", render);
        document.getElementById("f-apply").addEventListener("click", function () {
          render();
          runSearch();
        });
        document.getElementById("f-view").addEventListener("change", function () {
          syncViewControls();
          render();
        });
        document.getElementById("f-search").addEventListener("keydown", function (e) {
          if (e.key === "Enter") runSearch();
        });

        render();
        subscribe();
      })();
    </script>
  </body>
</html>
